name: Main Release Tag Gate

# Enforces release-marker discipline for PRs to main, and creates the
# corresponding v-prefixed tag on merge. The release-publish workflow
# (.github/workflows/release-publish.yml) listens for those tags and
# routes finals to PyPI, prereleases to TestPyPI.
#
# Required release-marker syntax (the leading `v` is mandatory; the
# bare `0.1.0` form is intentionally rejected so there is exactly one
# canonical version representation):
#   PR title:  "release: v0.1.0"   or  "release: v0.1.0-rc1"
#   PR label:  "release:v0.1.0"     or  "release:v0.1.0-rc1"
#
# Created tag:  v0.1.0  /  v0.1.0-rc1

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened, ready_for_review, labeled, unlabeled]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

env:
  # Final: vX.Y.Z. Prerelease: vX.Y.Z-<alphanum-or-dot>+. The leading
  # `v` is REQUIRED — bare `0.1.0` is rejected so the project carries
  # exactly one canonical version string. The capture group returns
  # the version without the leading 'v' so downstream code can compare
  # against pyproject.toml directly.
  RELEASE_TITLE_RE: '(?:^|\s)release:\s*v([0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.]+)?)(?:\s|$)'
  RELEASE_LABEL_RE: '^release:v([0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.]+)?)$'
  VERSION_RE: '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'

jobs:
  validate-release-intent:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate release marker on PR to main
        uses: actions/github-script@v9
        env:
          TITLE_RE: ${{ env.RELEASE_TITLE_RE }}
          LABEL_RE: ${{ env.RELEASE_LABEL_RE }}
          VERSION_RE: ${{ env.VERSION_RE }}
        with:
          script: |
            const title = context.payload.pull_request.title || "";
            const labels = (context.payload.pull_request.labels || []).map((l) => l.name);

            const titleRe = new RegExp(process.env.TITLE_RE, "i");
            const labelRe = new RegExp(process.env.LABEL_RE, "i");
            const versionRe = new RegExp(process.env.VERSION_RE);

            const titleMatch = title.match(titleRe);
            const labelMatches = labels
              .map((name) => name.match(labelRe))
              .filter(Boolean);

            const versions = new Set();
            if (titleMatch) versions.add(titleMatch[1]);
            for (const m of labelMatches) versions.add(m[1]);

            if (versions.size !== 1) {
              core.setFailed(
                "PRs targeting main must declare exactly one release version. " +
                "Use a title like 'release: v0.1.0' (or 'release: v0.1.0-rc1' " +
                "for a prerelease), or a label 'release:v0.1.0'. The leading " +
                "`v` is required."
              );
              return;
            }

            const [version] = Array.from(versions);
            core.info(`Detected release version: ${version}`);

            if (!versionRe.test(version)) {
              core.setFailed(`Invalid release version 'v${version}'. Expected vX.Y.Z or vX.Y.Z-suffix.`);
              return;
            }

            const tagRef = `v${version}`;
            const { data: refs } = await github.rest.git.listMatchingRefs({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${tagRef}`,
            });
            if (refs.some((r) => r.ref === `refs/tags/${tagRef}`)) {
              core.setFailed(`Tag '${tagRef}' already exists. Choose a new version.`);
              return;
            }

            const isPrerelease = version.includes("-");
            core.notice(
              `Release version '${version}' validated (${isPrerelease ? "prerelease → TestPyPI" : "final → PyPI"}). ` +
              `Merge to main will auto-tag the merge commit as '${tagRef}'.`
            );
            core.exportVariable("RELEASE_VERSION", version);

  # Pre-merge guard: assert pyproject.toml's project.version matches the PR
  # title's release marker BEFORE the merge happens. Without this, a stale
  # commit (e.g. PR re-targeted, branch out-of-sync with the version bump)
  # could land on main with a mismatched version, and `release-publish.yml`
  # would have to refuse the publish AFTER the merge — leaving main in a
  # state where the next release has to clean up. Running the same check
  # here means the PR is red before merge and the operator fixes it on the
  # source branch.
  check-version-vs-marker:
    if: github.event_name == 'pull_request'
    needs: [validate-release-intent]
    runs-on: ubuntu-latest
    steps:
      - name: Extract release version from PR title
        id: ver
        env:
          TITLE_RE: ${{ env.RELEASE_TITLE_RE }}
          LABEL_RE: ${{ env.RELEASE_LABEL_RE }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        shell: bash
        run: |
          set -euo pipefail
          # Re-extract the version client-side so we don't depend on the
          # github-script env var leaking across jobs.
          version="$(printf '%s\n' "${PR_TITLE}" | grep -oiE 'release:[[:space:]]*v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?' | head -1 | sed -E 's/^release:[[:space:]]*v//I' | sed -E 's/[[:space:]]+$//' || true)"
          if [[ -z "${version}" ]]; then
            # Fall back to label form (release:vX.Y.Z[-suffix]).
            version="$(printf '%s\n' "${PR_LABELS_JSON}" | grep -oiE 'release:v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?' | head -1 | sed -E 's/^release:v//I' || true)"
          fi
          if [[ -z "${version}" ]]; then
            echo "error: could not extract a release version from PR title or labels" >&2
            exit 1
          fi
          echo "version=${version}" | tee -a "${GITHUB_OUTPUT}"
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Verify pyproject version matches PR title
        run: |
          set -euo pipefail
          python scripts/check_release_version.py "v${{ steps.ver.outputs.version }}"

  tag-main-commit:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release version from merged PR and create tag
        uses: actions/github-script@v9
        env:
          TITLE_RE: ${{ env.RELEASE_TITLE_RE }}
          LABEL_RE: ${{ env.RELEASE_LABEL_RE }}
          VERSION_RE: ${{ env.VERSION_RE }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;

            const titleRe = new RegExp(process.env.TITLE_RE, "i");
            const labelRe = new RegExp(process.env.LABEL_RE, "i");
            const versionRe = new RegExp(process.env.VERSION_RE);

            // Retry the commit→PR association lookup. GitHub's API can lag
            // 10–30s after a merge before the association is indexed; that
            // race has bitten this gate twice (rc4 and v0.1.0). Try up to
            // 3 times with 30s sleep, then give up with a clear message.
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
            let pulls = [];
            for (let attempt = 1; attempt <= 3; attempt++) {
              const resp = await github.request(
                "GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls",
                { owner, repo, commit_sha: sha }
              );
              pulls = resp.data || [];
              if (pulls.length > 0) {
                if (attempt > 1) {
                  core.notice(`Found PR association for ${sha} on attempt ${attempt}.`);
                }
                break;
              }
              if (attempt < 3) {
                core.warning(
                  `No PR association for ${sha} yet (attempt ${attempt}/3); ` +
                  `sleeping 30s for the API to catch up.`
                );
                await sleep(30000);
              }
            }
            if (pulls.length === 0) {
              core.setFailed(
                `No PR found for commit ${sha} after 3 attempts (90s). ` +
                `main requires PR-based release merges with release markers. ` +
                `If this is a real release merge, re-run this workflow from ` +
                `the Actions UI; the API association usually settles within a ` +
                `minute or two.`
              );
              return;
            }

            const pr = pulls.find((p) => p.base?.ref === "main" && p.merged_at) || pulls[0];
            const title = pr.title || "";
            const labels = (pr.labels || []).map((l) => l.name);

            const titleMatch = title.match(titleRe);
            const labelMatches = labels
              .map((name) => name.match(labelRe))
              .filter(Boolean);

            const versions = new Set();
            if (titleMatch) versions.add(titleMatch[1]);
            for (const m of labelMatches) versions.add(m[1]);

            if (versions.size !== 1) {
              core.setFailed(
                `Merged PR #${pr.number} must contain exactly one release marker — ` +
                "title 'release: v0.1.0' (or 'release: v0.1.0-rc1' for a " +
                "prerelease) or label 'release:v0.1.0'. The leading `v` is required."
              );
              return;
            }

            const [version] = Array.from(versions);
            if (!versionRe.test(version)) {
              core.setFailed(`Invalid release version 'v${version}'. Expected vX.Y.Z or vX.Y.Z-suffix.`);
              return;
            }

            const tagRef = `v${version}`;
            const existing = await github.rest.git.listMatchingRefs({
              owner,
              repo,
              ref: `tags/${tagRef}`,
            });

            const exact = existing.data.find((r) => r.ref === `refs/tags/${tagRef}`);
            if (exact) {
              const existingSha = exact.object?.sha;
              if (existingSha === sha) {
                core.notice(`Tag '${tagRef}' already points at ${sha}.`);
                return;
              }
              core.setFailed(
                `Tag '${tagRef}' already exists on ${existingSha}; refusing to retarget to ${sha}.`
              );
              return;
            }

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tagRef}`,
              sha,
            });

            const isPrerelease = version.includes("-");
            core.notice(
              `Created release tag '${tagRef}' for commit ${sha} from merged PR #${pr.number}. ` +
              `release-publish.yml will publish to ${isPrerelease ? "TestPyPI" : "PyPI"}.`
            );
