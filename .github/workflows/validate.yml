name: Validate roadmap

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  roadmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert packaged Gantt UI static assets exist
        run: test -f specy_road/pm_gantt_static/index.html
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev]"
      - name: Validate roadmap and registry
        run: python scripts/validate_roadmap.py
      - name: Check roadmap markdown export
        run: python scripts/export_roadmap_md.py --check
      - name: File limits
        run: python scripts/validate_file_limits.py
      - name: Tests
        run: pytest
