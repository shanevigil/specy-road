name: Validate roadmap

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  roadmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert packaged Gantt UI static assets exist
        run: test -f specy_road/pm_gantt_static/index.html
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies (frozen lock)
        run: |
          pip install -r requirements-ci.txt
      - name: Upgrade pip (toolchain; avoids auditing old pip CVEs)
        run: python -m pip install --upgrade 'pip>=25.3'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit Python dependencies (pip-audit)
        id: pip_audit
        run: |
          set +e
          pip-audit -f json -o pip-audit-results.json
          echo $? > pip-audit.exitcode
          set -e
      - name: Upload pip-audit JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit-results.json
          if-no-files-found: ignore
      - name: Enforce pip-audit exit code
        run: test "$(cat pip-audit.exitcode)" -eq 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gui/pm-gantt/package-lock.json
      - name: Validate npm lockfile (lockfile-lint)
        run: |
          npx --yes lockfile-lint@4.14.0 \
            --path gui/pm-gantt/package-lock.json \
            --allowed-hosts npm \
            --allowed-schemes https:
      - name: Install and audit Gantt UI npm dependencies
        working-directory: gui/pm-gantt
        run: |
          npm ci
          set +e
          npm audit --omit=dev --json | tee ../../npm-audit-results.json
          echo ${PIPESTATUS[0]} > ../../npm-audit.exitcode
          set -e
      - name: Upload npm audit JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-results
          path: npm-audit-results.json
          if-no-files-found: ignore
      - name: Enforce npm audit exit code
        run: test "$(cat npm-audit.exitcode)" -eq 0
      - name: PM Gantt unit tests (Vitest)
        working-directory: gui/pm-gantt
        run: npm test
      - name: PM Gantt production build
        working-directory: gui/pm-gantt
        run: npm run build
      - name: Enforce PM Gantt bundle budget
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          budget_bytes = 900_000
          assets = sorted(
              Path("specy_road/pm_gantt_static/assets").glob("index-*.js")
          )
          if not assets:
              print("error: no built PM Gantt index chunk found")
              sys.exit(1)
          latest = max(assets, key=lambda p: p.stat().st_mtime)
          size = latest.stat().st_size
          print(f"PM Gantt entry chunk: {latest} ({size} bytes)")
          if size > budget_bytes:
              print(
                  f"error: PM Gantt entry chunk exceeds budget "
                  f"({size} > {budget_bytes} bytes)"
              )
              sys.exit(1)
          PY
      - name: Install OSV-Scanner
        run: |
          curl -sSL -o /usr/local/bin/osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64
          chmod +x /usr/local/bin/osv-scanner
      - name: OSV-Scanner (lockfiles)
        run: |
          osv-scanner scan \
            -L requirements-ci.txt \
            -L gui/pm-gantt/package-lock.json \
            --format json \
            --output-file osv-scanner-results.json
      - name: Upload OSV-Scanner JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: osv-scanner-results
          path: osv-scanner-results.json
          if-no-files-found: ignore
      - name: Validate roadmap and registry (dogfood fixture)
        run: python specy_road/bundled_scripts/validate_roadmap.py --repo-root tests/fixtures/specy_road_dogfood
      - name: Check roadmap markdown export (dogfood fixture)
        run: python specy_road/bundled_scripts/export_roadmap_md.py --check --repo-root tests/fixtures/specy_road_dogfood
      - name: File limits
        run: python specy_road/bundled_scripts/validate_file_limits.py
      - name: Tests
        run: pytest
